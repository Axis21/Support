name: "🐞 Bug report"
description: Report an issue with the platform.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report an issue.

        ⚠️ **Public repository:** Anything you submit here can be read by others. Do not include passwords, API keys, access tokens, customer data, or confidential project information.

        For confidential or account-specific support, please contact us through your usual support channel instead of posting here.

  - type: textarea
    id: description
    attributes:
      label: Describe the issue
      description: Please describe what happened, where you noticed it, and what you expected.
    validations:
      required: true
